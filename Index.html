<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabbir Collection | Premium Apparel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; line-height: 1.6; }
        header { background: #000; color: #fff; padding: 60px 20px; text-align: center; border-bottom: 5px solid #28a745; }
        header h1 { margin: 0; font-size: 45px; text-transform: uppercase; letter-spacing: 4px; }
        .container { width: 90%; max-width: 1200px; margin: auto; padding: 40px 0; }
        .section-title { text-align: center; font-size: 32px; margin-bottom: 40px; position: relative; padding-bottom: 15px; color: #1a1a1a; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .product-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid #eee; }
        .product-card img { width: 100%; height: 380px; object-fit: cover; }
        .info { padding: 25px; }
        .price { font-size: 24px; font-weight: 700; color: #28a745; margin-bottom: 20px; }
        .buy-btn { background: #25D366; color: #fff; padding: 14px 30px; text-decoration: none; border-radius: 50px; display: inline-block; font-weight: 600; }
        footer { background: #1a1a1a; color: #fff; text-align: center; padding: 30px; }
    </style>
</head>
<body>
<header>
    <h1>Sabbir Collection</h1>
    <p>Manufacturer of Premium Quality Trousers</p>
</header>
<div class="container">
    <h2 class="section-title">Premium Collection</h2>
    <div class="product-grid">
        <div class="product-card">
            <img src="2663.jpg" alt="Black Full Trouser">
            <div class="info">
                <h3>AX Series Premium Black</h3>
                <div class="price">৳ 550</div>
                <a href="https://wa.me/8801568988609" class="buy-btn">Order on WhatsApp</a>
            </div>
        </div>
        <div class="product-card">
            <img src="4170.png" alt="Black Short">
            <div class="info">
                <h3>Urban Black Side-Lace</h3>
                <div class="price">৳ 350</div>
                <a href="https://wa.me/8801568988609" class="buy-btn">Order on WhatsApp</a>
            </div>
        </div>
    </div>
</div>
<footer><p>&copy; 2026 Sabbir Collection</p></footer>
</body>
</html>
